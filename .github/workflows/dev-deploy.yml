name: Deploy to TestFlight

on:
  workflow_dispatch:

jobs:
  build:
    name: Build iOS
    runs-on: ubuntu-latest
    outputs:
      build-id: ${{ steps.build.outputs.build-id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup mise
        uses: jdx/mise-action@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS
        id: build
        run: |
          BUILD_JSON=$(eas build --platform ios --profile production --non-interactive --json)
          BUILD_ID=$(echo "$BUILD_JSON" | jq -r '.[0].id')
          if [ -z "$BUILD_ID" ] || [ "$BUILD_ID" = "null" ]; then
            echo "::error::Failed to extract build ID"
            echo "$BUILD_JSON"
            exit 1
          fi
          echo "build-id=$BUILD_ID" >> $GITHUB_OUTPUT
          echo "Build ID: $BUILD_ID"

  submit:
    name: Submit to TestFlight
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup mise
        uses: jdx/mise-action@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Submit to TestFlight
        run: eas submit --platform ios --id ${{ needs.build.outputs.build-id }} --profile production --non-interactive

  notify:
    name: Notify Discord
    runs-on: ubuntu-latest
    needs: submit

    steps:
      - name: Notify Discord
        run: |
          curl -s -X POST \
            -H "Content-Type: application/json" \
            -d '{"content":"**Dev TestFlight 배포 성공**"}' \
            "${{ secrets.DISCORD_WEBHOOK_URL_DEV_DEPOLY }}"
